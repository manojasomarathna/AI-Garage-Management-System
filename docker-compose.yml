version: '3.8'

services:
  db:
    image: postgres:15
    container_name: garage_db
    environment:
      POSTGRES_DB: garage_erp
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  odoo:
    image: odoo:16.0
    container_name: garage_odoo
    depends_on:
      - db
    ports:
      - "8069:8069"
    volumes:
      - ./custom_addons:/mnt/extra-addons
      - odoo_data:/var/lib/odoo
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo_password
    command: odoo --dev=all

volumes:
  postgres_data:
  odoo_data:
